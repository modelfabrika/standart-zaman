<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASO Model Fabrika - Standart Zaman Ölçümü</title>
    <style>
        :root {
            --primary-blue: #004a99;
            --dark-blue: #003366;
            --bg-color: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 30px;
            width: 100%;
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .brand-title {
            font-weight: 800;
            color: #333;
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        h2 {
            color: var(--primary-blue);
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 35px 15px;
            max-width: 1100px;
        }

        .btn {
            padding: 15px 28px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            background-color: var(--primary-blue);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: var(--dark-blue);
            transform: translateY(-2px);
        }

        .btn.active {
            background-color: #222 !important;
            color: white;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        .main-stage {
            width: 95%;
            max-width: 1100px;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 600px) {
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-title">ASO MODEL FABRİKA</div>
        <h2>STANDART ZAMAN ÖLÇÜMÜ</h2>
    </div>

    <div class="button-group">
        <button id="firstBtn" class="btn" onclick="play(this, '1AsfSokZ-ok2BDH_ksEsB7aYbc02bfU8X')">Ön Montaj</button>
        <button class="btn" onclick="play(this, '1RwIo9yYn8SVVAfK9WXJvuIj14X4ztT9P')">D40 Montaj</button>
        <button class="btn" onclick="play(this, '1VX9_ARFDSXdpeJ3thtNyV1OjZNxGfSuG')">D25 Montaj</button>
        <button class="btn" onclick="play(this, '17jUbKu2loVpbh_BI4HisJrt6j88s-56T')">Fonksiyonel Test</button>
        <button class="btn" onclick="play(this, '1Wb5JCiHLSiYKhEI-Cf6VjjNYiY0DZfpO')">Paketleme</button>
    </div>

    <div class="main-stage">
        <div class="video-container">
            <iframe id="videoPlayer" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
        </div>
    </div>

    <script>
        function play(btn, id) {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const player = document.getElementById('videoPlayer');
            const embedUrl = "https://drive.google.com/file/d/" + id + "/preview?authuser=0";
            
            player.src = embedUrl;
        }

        // Sayfa yüklendiğinde Ön Montaj'ın otomatik gelmesi için:
        document.addEventListener('DOMContentLoaded', () => {
            const firstButton = document.getElementById('firstBtn');
            if (firstButton) {
                play(firstButton, '1AsfSokZ-ok2BDH_ksEsB7aYbc02bfU8X');
            }
        });
    </script>

</body>
</html>
